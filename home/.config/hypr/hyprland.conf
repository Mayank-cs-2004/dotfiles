###########################################################################


# =========================================================================
# 1. MONITORS
# =========================================================================

monitor = , preferred, auto, 1

xwayland {
    enabled = true
}


# =========================================================================
# 2. DEFAULT PROGRAMS
# =========================================================================

$terminal    = foot
$fileManager = foot -e yazi
$menu        = rofi -show drun
$browser     = helium-browser
$editor      = foot -a nvim -e nvim .


# =========================================================================
# 3. AUTOSTART
# =========================================================================

# System essentials
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = env MALLOC_ARENA_MAX=1 swaync
exec-once = env MALLOC_ARENA_MAX=1 waybar
exec-once = hypridle
exec-once = env MALLOC_ARENA_MAX=1 udiskie

# Clipboard manager (text + images)
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Wallpaper daemon
exec-once = awww-daemon
exec-once = awww img $HOME/.config/wallpaper/homescreen.png --transition-fps 60 --transition-type outer --transition-duration 0.8


# =========================================================================
# 4. ENVIRONMENT VARIABLES
# =========================================================================

# Cursor
env = XCURSOR_THEME, Bibata-Modern-Classic
env = XCURSOR_SIZE,  24
env = HYPRCURSOR_SIZE, 24

# Toolkit backends
env = GDK_BACKEND,   wayland,x11,*
env = SDL_VIDEODRIVER, wayland
env = CLUTTER_BACKEND, wayland

# Qt
env = QT_QPA_PLATFORM,                wayland
env = QT_QPA_PLATFORMTHEME,           qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR,    1


# =========================================================================
# 5. INPUT & DEVICE SETTINGS
# =========================================================================

input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = true
    }
}


# =========================================================================
# 6. LOOK AND FEEL
# =========================================================================

general {
    gaps_in       = 4
    gaps_out      = 10
    border_size   = 0
    layout        = dwindle
    allow_tearing = false
}

decoration {
    rounding         = 5
    active_opacity   = 0.95
    inactive_opacity = 0.87

    shadow {
        enabled = false
    }

    blur {
        enabled        = true
        size           = 1
        passes         = 2
        ignore_opacity = true
        xray           = false
    }
}

animations {
    enabled   = true
    bezier    = md3_decel, 0.05, 0.7, 0.1, 1
    animation = windows,    1, 3, md3_decel, slide
    animation = windowsOut, 1, 3, md3_decel, popin 60%
    animation = border,     1, 4, default
    animation = fade,       1, 3, md3_decel
    animation = workspaces, 1, 3, md3_decel, slide
}

dwindle {
    preserve_split = true
    smart_split    = false
}

misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    vrr                      = 1
}


# =========================================================================
# 7. KEYBINDINGS
# =========================================================================

$mainMod = SUPER

# --- Application shortcuts ---
bind = $mainMod, a, exec, $terminal
bind = $mainMod, s, exec, $editor
bind = $mainMod, d, exec, $browser
bind = $mainMod, f, exec, $fileManager

# --- Window management ---
bind = $mainMod,       q, killactive,
bind = $mainMod,       w, exec,           $menu
bind = $mainMod,       g, togglefloating,
bind = $mainMod,       h, fullscreen,
bind = $mainMod SHIFT, m, exit,

# --- System tools ---
bind = $mainMod SHIFT, l, exec, hyprlock
bind = $mainMod,       e, exec, bash $HOME/.config/scripts/switch_wallpaper.sh
bind = $mainMod,       x, exec, bash $HOME/.config/scripts/caffeine_mode.sh
bind = $mainMod,       z, exec, bash $HOME/.config/scripts/nightlight.sh
bind = $mainMod,       c, exec, hyprpicker

# --- Bar / notification reset (Ctrl+Escape) ---
bind = Ctrl, Escape, exec, killall waybar  || waybar
bind = Ctrl, Escape, exec, killall swaync  || swaync

# --- Screenshots ---
bind = $mainMod SHIFT,       s, exec, bash $HOME/.config/scripts/screenshot.sh area-clipboard
bind = ,                 PRINT, exec, bash $HOME/.config/scripts/screenshot.sh full-file
bind = $mainMod Ctrl SHIFT,  s, exec, bash $HOME/.config/scripts/screenshot.sh area-file

# --- Audio (wpctl) ---
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle

# --- Brightness (brightnessctl) ---
bind = , XF86MonBrightnessUp,   exec, brightnessctl s +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# --- Workspace navigation ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Scroll through workspaces
bind = $mainMod, h, workspace, e-1
bind = $mainMod, l, workspace, e+1

# --- Move window to workspace ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Focus (arrow keys) ---
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# --- Move windows (Shift + arrow keys) ---
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# --- Resize windows (Alt + arrow keys) ---
binde = $mainMod ALT, right, resizeactive,  25   0
binde = $mainMod ALT, left,  resizeactive, -25   0
binde = $mainMod ALT, up,    resizeactive,   0 -25
binde = $mainMod ALT, down,  resizeactive,   0  25

# --- Mouse ---
bind  = $mainMod, mouse_down, workspace,   e+1
bind  = $mainMod, mouse_up,   workspace,   e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow


# =========================================================================
# 8. WINDOW & LAYER RULES
# =========================================================================

# Floating windows
windowrule = match:class ^(qt5ct)$,                float on
windowrule = match:class ^(qt6ct)$,                float on
windowrule = match:class ^(nwg-look)$,             float on
windowrule = match:class ^(nm-applet)$,            float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(lxqt-policykit-agent)$, float on

# Layer rules (blur & transparency)
layerrule = match:namespace tofi,   ignore_alpha 0
layerrule = match:namespace swaync, ignore_alpha 0
layerrule = match:namespace swaync, blur on
layerrule = match:namespace waybar, blur off
